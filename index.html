<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="音声日記">
<title>音声日記</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --purple:#7F77DD;--purple-light:#EEEDFE;--purple-dark:#3C3489;--purple-mid:#534AB7;
  --green-light:#EAF3DE;--green-dark:#3B6D11;
  --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#A32D2D;
  --bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ed;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#fff;--text2:#ababab;--text3:#6e6e73;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --purple-light:#2a2860;--green-light:#1a2e0f;
  }
}
html,body{height:100%;overflow:hidden;background:#000;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;display:flex;justify-content:center;}
.app{width:100%;max-width:430px;height:100%;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}
.sbar{background:#1a1a2e;color:#fff;font-size:12px;padding:env(safe-area-inset-top,12px) 20px 8px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.on{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 32px;}
.nav{display:flex;border-top:0.5px solid var(--border);background:var(--bg);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0);}
.nb{flex:1;padding:8px 4px 10px;font-size:10px;color:var(--text2);background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2px solid transparent;-webkit-appearance:none;}
.nb.on{color:var(--purple);border-top-color:var(--purple);}
.nb svg{width:22px;height:22px;fill:currentColor;}
.dh{text-align:center;margin-bottom:20px;padding-top:6px;}
.dh h1{font-size:21px;font-weight:600;color:var(--text);}
.dh p{font-size:13px;color:var(--text2);margin-top:3px;}
.rarea{background:var(--purple-light);border-radius:20px;padding:28px 16px 22px;text-align:center;margin-bottom:16px;}
.rbtn{width:80px;height:80px;border-radius:50%;background:var(--purple);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;transition:transform .1s;-webkit-appearance:none;}
.rbtn:active{transform:scale(.93);}
.rbtn.rec{background:var(--red);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,.4);}50%{box-shadow:0 0 0 16px rgba(226,75,74,0);}}
.rlabel{font-size:15px;font-weight:600;color:var(--purple-dark);}
.rtimer{font-size:13px;color:var(--purple-mid);margin-top:5px;min-height:20px;font-variant-numeric:tabular-nums;letter-spacing:.5px;}
.qcard{background:var(--bg);border:0.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;}
.qnum{font-size:11px;color:var(--purple);font-weight:600;margin-bottom:7px;}
.qtext{font-size:17px;color:var(--text);line-height:1.5;font-weight:500;}
.qbtns{display:flex;gap:10px;margin-top:16px;}
.btn-next{flex:1;padding:12px;background:var(--purple);color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600;-webkit-appearance:none;}
.btn-next:active{opacity:.82;}
.btn-stop{padding:12px 16px;background:none;border:0.5px solid var(--border2);border-radius:12px;font-size:14px;color:var(--text2);cursor:pointer;-webkit-appearance:none;}
.hsec h3{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;}
.hitem{background:var(--bg2);border-radius:12px;padding:13px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.hitem:active{opacity:.75;}
.hdate{font-size:14px;font-weight:600;color:var(--text);}
.hdur{font-size:12px;color:var(--text2);margin-top:2px;}
.done-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.done-ico{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.done-ico.ok{background:var(--green-light);}
.done-ico.ok svg{fill:var(--green-dark);}
.done-ico.spin{background:var(--purple-light);}
.done-ico.spin svg{fill:var(--purple);animation:rotate 1s linear infinite;}
@keyframes rotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.done h2{font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px;}
.done p{font-size:14px;color:var(--text2);line-height:1.7;white-space:pre-wrap;}
.prog-bar{width:100%;max-width:240px;height:4px;background:var(--bg3);border-radius:2px;margin-top:18px;overflow:hidden;}
.prog-fill{height:100%;background:var(--purple);border-radius:2px;transition:width .5s ease;}
.done-btn{margin-top:28px;padding:14px 36px;background:var(--purple);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;-webkit-appearance:none;}
.done-btn:active{opacity:.85;}
.log-entry{background:var(--bg);border:0.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;}
.log-date{font-size:12px;color:var(--text2);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.log-del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;padding:2px 6px;-webkit-appearance:none;}
.log-qa{margin-bottom:10px;}
.log-q{font-size:11px;color:var(--purple);font-weight:600;margin-bottom:4px;}
.log-a{font-size:14px;color:var(--text);line-height:1.65;}
.empty{text-align:center;padding:64px 24px;color:var(--text3);font-size:14px;line-height:1.7;}
.ssec{margin-bottom:22px;}
.shead{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;letter-spacing:.4px;text-transform:uppercase;}
.scard{background:var(--bg);border:0.5px solid var(--border);border-radius:16px;overflow:hidden;}
.srow{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);}
.srow:last-child{border-bottom:none;}
.slab{font-size:15px;color:var(--text);}
.sval{font-size:14px;color:var(--text2);}
.tog{width:44px;height:26px;border-radius:13px;background:var(--purple);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.tog::after{content:'';width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;right:3px;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.tog.off{background:var(--bg3);}
.tog.off::after{right:auto;left:3px;}
input[type=time]{border:none;font-size:14px;color:var(--text);background:transparent;cursor:pointer;outline:none;}
.qi{padding:12px 16px;border-bottom:0.5px solid var(--border);}
.qi:last-child{border-bottom:none;}
.qitxt{font-size:14px;color:var(--text);margin-bottom:6px;line-height:1.4;}
.qiact{display:flex;gap:6px;}
.chip{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);color:var(--text2);cursor:pointer;background:none;-webkit-appearance:none;}
.chip.del{color:var(--red-dark);border-color:#F09595;}
.addq{padding:12px 16px;border-top:0.5px solid var(--border);}
.addq input{width:100%;padding:10px 12px;border:0.5px solid var(--border2);border-radius:10px;font-size:14px;color:var(--text);background:var(--bg2);-webkit-appearance:none;outline:none;}
.addq button{width:100%;margin-top:8px;padding:10px;background:none;border:0.5px solid var(--purple);border-radius:10px;color:var(--purple);font-size:14px;cursor:pointer;font-weight:600;-webkit-appearance:none;}
.delbtn{width:100%;margin-top:10px;padding:13px;background:none;border:0.5px solid var(--red);border-radius:14px;font-size:14px;color:var(--red);cursor:pointer;font-weight:600;-webkit-appearance:none;}
.note{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:10px;padding:10px 14px;margin-top:8px;line-height:1.6;}
</style>
</head>
<body>
<div class="app">
  <div class="sbar">
    <span id="sbar-time">--:--</span>
    <span style="font-weight:600;">音声日記</span>
    <span style="font-size:10px;">●●●</span>
  </div>

  <!-- HOME -->
  <div class="screen on" id="sc-home">
    <div class="scroll" id="home-scroll">
      <div class="dh">
        <h1 id="today-label"></h1>
        <p>今日の日記を録音しよう</p>
      </div>
      <div class="rarea" id="rarea">
        <button class="rbtn" id="rbtn" onclick="onRecBtn()">
          <svg viewBox="0 0 24 24" style="fill:#fff;width:32px;height:32px;"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 3.27-3.32 5.8-6.91 5.8s-6.42-2.53-6.91-5.8H2.09C2.6 15.34 6.02 18.35 10 18.91V22h4v-3.09c3.98-.56 7.4-3.57 7.91-7.91h-2z"/></svg>
        </button>
        <div class="rlabel" id="rlabel">タップして録音開始</div>
        <div class="rtimer" id="rtimer"></div>
      </div>
      <div id="qdisp" style="display:none;">
        <div class="qcard">
          <div class="qnum" id="qnum"></div>
          <div class="qtext" id="qtext"></div>
          <div class="qbtns">
            <button class="btn-next" id="btnNext">次の質問へ</button>
            <button class="btn-stop" onclick="stopRec()">録音終了</button>
          </div>
        </div>
      </div>
      <div class="hsec" id="hsec">
        <h3>最近の記録</h3>
        <div id="hlist"></div>
        <div id="hempty" style="display:none;font-size:13px;color:var(--text3);text-align:center;padding:20px 0;">まだ記録がありません</div>
      </div>
    </div>
    <div class="done-wrap" id="done-panel" style="display:none;">
      <div class="done-ico spin" id="done-ico">
        <svg viewBox="0 0 24 24" width="28" height="28"><path d="M12 6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8 0 1.57.46 3.03 1.24 4.26L6.7 14.8c-.45-.83-.7-1.79-.7-2.8 0-3.31 2.69-6 6-6zm6.76 1.74L17.3 9.2c.44.84.7 1.79.7 2.8 0 3.31-2.69 6-6 6v-3l-4 4 4 4v-3c4.42 0 8-3.58 8-8 0-1.57-.46-3.03-1.24-4.26z"/></svg>
      </div>
      <h2 id="done-title">処理中...</h2>
      <p id="done-msg"></p>
      <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <button class="done-btn" id="done-home-btn" onclick="backHome()" style="display:none;">ホームへ戻る</button>
    </div>
  </div>

  <!-- LOG -->
  <div class="screen" id="sc-log">
    <div class="scroll">
      <div style="margin-bottom:16px;padding-top:4px;display:flex;justify-content:space-between;align-items:center;">
        <h2 style="font-size:20px;font-weight:700;color:var(--text);">履歴</h2>
        <span id="log-count" style="font-size:13px;color:var(--text2);"></span>
      </div>
      <div id="loglist"></div>
      <div class="empty" id="log-empty" style="display:none;">録音するとここに<br>文字起こしが表示されます</div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="screen" id="sc-settings">
    <div class="scroll">
      <div style="margin-bottom:16px;padding-top:4px;"><h2 style="font-size:20px;font-weight:700;color:var(--text);">設定</h2></div>
      <div class="ssec">
        <div class="shead">通知</div>
        <div class="scard">
          <div class="srow"><span class="slab">毎日通知</span><div class="tog off" id="notif-tog" onclick="toggleNotif()"></div></div>
          <div class="srow"><span class="slab">通知時刻</span><input type="time" id="notif-time" value="22:00" onchange="S.notifTime=this.value;save();"></div>
        </div>
        <div class="note">iPhoneの「ショートカット」アプリ → オートメーション → 時刻 → 「URLを開く」でこのアプリのURLを設定してください。</div>
      </div>
      <div class="ssec">
        <div class="shead">質問リスト</div>
        <div class="scard">
          <div id="qlist-s"></div>
          <div class="addq">
            <input id="newq" placeholder="新しい質問を入力..." onkeydown="if(event.key==='Enter')addQ();">
            <button onclick="addQ()">＋ 質問を追加</button>
          </div>
        </div>
      </div>
      <div class="ssec">
        <div class="shead">データ</div>
        <div class="scard">
          <div class="srow"><span class="slab">保存件数</span><span class="sval" id="data-count">0件</span></div>
          <div class="srow"><span class="slab">音声データ</span><span class="sval">保存しない</span></div>
          <div class="srow"><span class="slab">文字起こし</span><span class="sval">この端末に保存</span></div>
        </div>
        <button class="delbtn" onclick="clearData()">すべての記録を削除</button>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nb on" id="nb-home" onclick="tab('home')">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 3.27-3.32 5.8-6.91 5.8s-6.42-2.53-6.91-5.8H2.09C2.6 15.34 6.02 18.35 10 18.91V22h4v-3.09c3.98-.56 7.4-3.57 7.91-7.91h-2z"/></svg>
      録音
    </button>
    <button class="nb" id="nb-log" onclick="tab('log')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
      履歴
    </button>
    <button class="nb" id="nb-settings" onclick="tab('settings')">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      設定
    </button>
  </div>
</div>

<script>
const SK='vdiary_v4';
const DAYS=['日','月','火','水','木','金','土'];
let S={questions:['今日、一番よかったことは何ですか？','今日、難しかったことや改善したいことは？','今日の感情・気分を一言で表すと？','明日の自分へ一言。'],logs:[],notifOn:false,notifTime:'22:00'};
function load(){try{const s=localStorage.getItem(SK);if(s)S={...S,...JSON.parse(s)};}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
let recording=false,mediaRec=null,audioChunks=[],timerInt=null,secs=0,curQ=0,sessionQAs=[];

function tab(n){
  ['home','log','settings'].forEach(x=>{document.getElementById('sc-'+x).classList.remove('on');document.getElementById('nb-'+x).classList.remove('on');});
  document.getElementById('sc-'+n).classList.add('on');document.getElementById('nb-'+n).classList.add('on');
  if(n==='log')renderLog();if(n==='settings')renderSettings();
}
function initUI(){
  const d=new Date();
  document.getElementById('today-label').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日（'+DAYS[d.getDay()]+'）';
  function tick(){const n=new Date();document.getElementById('sbar-time').textContent=pad(n.getHours())+':'+pad(n.getMinutes());}
  tick();setInterval(tick,15000);
}
function pad(n){return String(n).padStart(2,'0');}
function onRecBtn(){if(!recording)startRec();}

async function startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    mediaRec=new MediaRecorder(stream);audioChunks=[];sessionQAs=[];curQ=0;secs=0;
    mediaRec.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRec.start(500);recording=true;
    document.getElementById('rbtn').classList.add('rec');
    document.getElementById('rbtn').innerHTML='<svg viewBox="0 0 24 24" style="fill:#fff;width:28px;height:28px;"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
    document.getElementById('rlabel').textContent='録音中...';
    document.getElementById('qdisp').style.display='block';
    document.getElementById('hsec').style.display='none';
    updateQ();
    timerInt=setInterval(()=>{secs++;document.getElementById('rtimer').textContent=pad(Math.floor(secs/60))+':'+pad(secs%60);},1000);
  }catch(e){alert('マイクへのアクセスを許可してください。\nSafari設定 → マイク → 許可');}
}

function updateQ(){
  const q=S.questions;
  document.getElementById('qnum').textContent='質問 '+(curQ+1)+' / '+q.length;
  document.getElementById('qtext').textContent=q[curQ];
  const nb=document.getElementById('btnNext');
  if(curQ>=q.length-1){nb.textContent='録音終了';nb.onclick=stopRec;}
  else{nb.textContent='次の質問へ';nb.onclick=nextQ;}
}
function nextQ(){sessionQAs.push({q:S.questions[curQ],a:''});if(curQ<S.questions.length-1){curQ++;updateQ();}}

async function stopRec(){
  clearInterval(timerInt);recording=false;
  sessionQAs.push({q:S.questions[curQ],a:''});
  document.getElementById('qdisp').style.display='none';
  document.getElementById('rarea').style.display='none';
  document.getElementById('done-panel').style.display='flex';
  const prog=document.getElementById('prog'),msg=document.getElementById('done-msg');
  if(mediaRec&&mediaRec.state!=='inactive'){
    await new Promise(r=>{mediaRec.onstop=r;mediaRec.stop();});
    mediaRec.stream.getTracks().forEach(t=>t.stop());
  }
  prog.style.width='30%';msg.textContent='音声を処理しています...';await sleep(400);
  prog.style.width='60%';msg.textContent='文字起こし中...';
  const transcripts=await doTranscribe();
  sessionQAs.forEach((qa,i)=>{qa.a=transcripts[i]||'（音声認識できませんでした）';});
  prog.style.width='90%';msg.textContent='保存しています...';await sleep(300);
  const entry={id:Date.now(),date:new Date().toISOString(),duration:secs,qas:[...sessionQAs]};
  S.logs.unshift(entry);
  if(S.logs.length>30)S.logs=S.logs.slice(0,30);
  save();audioChunks=[];
  prog.style.width='100%';await sleep(200);
  const ico=document.getElementById('done-ico');
  ico.className='done-ico ok';
  ico.innerHTML='<svg viewBox="0 0 24 24" width="28" height="28"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
  document.getElementById('done-title').textContent='完了！';
  msg.textContent='文字起こしを保存しました。\n履歴タブから確認できます。';
  document.getElementById('done-home-btn').style.display='block';
}

async function doTranscribe(){
  return new Promise(resolve=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){resolve(sessionQAs.map(()=>'（Safariをお使いください。このブラウザは音声認識非対応です）'));return;}
    const blob=new Blob(audioChunks,{type:mediaRec.mimeType||'audio/webm'});
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    const rec=new SR();
    rec.lang='ja-JP';rec.continuous=true;rec.interimResults=false;
    const parts=[];
    rec.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)parts.push(e.results[i][0].transcript);};
    rec.onend=()=>{URL.revokeObjectURL(url);const full=parts.join('');resolve(sessionQAs.map((_,i)=>parts[i]||(i===0?full:'')||'（音声を認識できませんでした）'));};
    rec.onerror=()=>resolve(sessionQAs.map(()=>'（音声認識エラー）'));
    try{rec.start();audio.play().catch(()=>{});setTimeout(()=>{try{rec.stop();}catch(e){}},Math.max(secs*1000+2000,4000));}
    catch(e){resolve(sessionQAs.map(()=>'（音声認識できませんでした）'));}
  });
}

function backHome(){
  document.getElementById('done-panel').style.display='none';
  document.getElementById('rarea').style.display='block';
  document.getElementById('hsec').style.display='block';
  const ico=document.getElementById('done-ico');
  ico.className='done-ico spin';
  ico.innerHTML='<svg viewBox="0 0 24 24" width="28" height="28"><path d="M12 6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8 0 1.57.46 3.03 1.24 4.26L6.7 14.8c-.45-.83-.7-1.79-.7-2.8 0-3.31 2.69-6 6-6zm6.76 1.74L17.3 9.2c.44.84.7 1.79.7 2.8 0 3.31-2.69 6-6 6v-3l-4 4 4 4v-3c4.42 0 8-3.58 8-8 0-1.57-.46-3.03-1.24-4.26z"/></svg>';
  document.getElementById('done-title').textContent='処理中...';
  document.getElementById('done-msg').textContent='';
  document.getElementById('done-home-btn').style.display='none';
  document.getElementById('prog').style.width='0%';
  document.getElementById('rbtn').classList.remove('rec');
  document.getElementById('rbtn').innerHTML='<svg viewBox="0 0 24 24" style="fill:#fff;width:32px;height:32px;"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 3.27-3.32 5.8-6.91 5.8s-6.42-2.53-6.91-5.8H2.09C2.6 15.34 6.02 18.35 10 18.91V22h4v-3.09c3.98-.56 7.4-3.57 7.91-7.91h-2z"/></svg>';
  document.getElementById('rlabel').textContent='タップして録音開始';
  document.getElementById('rtimer').textContent='';
  renderHomeList();
}

function renderHomeList(){
  const list=document.getElementById('hlist'),empty=document.getElementById('hempty');
  list.innerHTML='';
  if(!S.logs.length){empty.style.display='block';return;}
  empty.style.display='none';
  S.logs.slice(0,5).forEach(log=>{
    const d=new Date(log.date);
    const div=document.createElement('div');div.className='hitem';
    div.innerHTML='<div><div class="hdate">'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+DAYS[d.getDay()]+'）</div><div class="hdur">'+Math.floor(log.duration/60)+'分'+pad(log.duration%60)+'秒　'+log.qas.length+'問</div></div><span style="font-size:18px;color:var(--text3);">›</span>';
    div.onclick=()=>tab('log');list.appendChild(div);
  });
}

function renderLog(){
  const list=document.getElementById('loglist'),empty=document.getElementById('log-empty'),count=document.getElementById('log-count');
  list.innerHTML='';
  if(!S.logs.length){empty.style.display='block';count.textContent='';return;}
  empty.style.display='none';count.textContent=S.logs.length+'件';
  S.logs.forEach(log=>{
    const d=new Date(log.date);
    const card=document.createElement('div');card.className='log-entry';
    let h='<div class="log-date"><span>'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+DAYS[d.getDay()]+'）　'+pad(d.getHours())+':'+pad(d.getMinutes())+'　'+Math.floor(log.duration/60)+'分'+pad(log.duration%60)+'秒</span><button class="log-del" onclick="deleteLog('+log.id+')">削除</button></div>';
    (log.qas||[]).forEach(qa=>{h+='<div class="log-qa"><div class="log-q">'+qa.q+'</div><div class="log-a">'+(qa.a||'（未回答）')+'</div></div>';});
    card.innerHTML=h;list.appendChild(card);
  });
}

function deleteLog(id){if(!confirm('この記録を削除しますか？'))return;S.logs=S.logs.filter(l=>l.id!==id);save();renderLog();renderHomeList();}

function renderSettings(){
  const ql=document.getElementById('qlist-s');ql.innerHTML='';
  S.questions.forEach((q,i)=>{
    const div=document.createElement('div');div.className='qi';
    div.innerHTML='<div class="qitxt">'+q+'</div><div class="qiact"><button class="chip" onclick="mqUp('+i+')">↑</button><button class="chip" onclick="mqDown('+i+')">↓</button><button class="chip del" onclick="mqDel('+i+')">削除</button></div>';
    ql.appendChild(div);
  });
  document.getElementById('notif-time').value=S.notifTime||'22:00';
  document.getElementById('notif-tog').className='tog'+(S.notifOn?'':' off');
  document.getElementById('data-count').textContent=S.logs.length+'件';
}

function toggleNotif(){S.notifOn=!S.notifOn;save();renderSettings();}
function addQ(){const inp=document.getElementById('newq'),v=inp.value.trim();if(!v)return;S.questions.push(v);save();inp.value='';renderSettings();}
function mqDel(i){if(S.questions.length<=1)return;S.questions.splice(i,1);save();renderSettings();}
function mqUp(i){if(i===0)return;[S.questions[i-1],S.questions[i]]=[S.questions[i],S.questions[i-1]];save();renderSettings();}
function mqDown(i){if(i>=S.questions.length-1)return;[S.questions[i],S.questions[i+1]]=[S.questions[i+1],S.questions[i]];save();renderSettings();}
function clearData(){if(!confirm('すべての記録を削除しますか？この操作は取り消せません。'))return;S.logs=[];save();renderLog();renderHomeList();renderSettings();}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

load();initUI();renderHomeList();
</script>
</body>
</html>
