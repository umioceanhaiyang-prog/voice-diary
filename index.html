<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="音声日記">
<title>音声日記</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --purple:#7F77DD;--purple-light:#EEEDFE;--purple-dark:#3C3489;--purple-mid:#534AB7;
  --green-light:#EAF3DE;--green-dark:#3B6D11;
  --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#A32D2D;
  --bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ed;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#fff;--text2:#ababab;--text3:#6e6e73;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --purple-light:#2a2860;--green-light:#1a2e0f;
  }
}
html,body{height:100%;overflow:hidden;background:#000;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;display:flex;justify-content:center;}
.app{width:100%;max-width:430px;height:100%;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}
.sbar{background:#1a1a2e;color:#fff;font-size:12px;padding:env(safe-area-inset-top,12px) 20px 8px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.on{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 32px;}
.nav{display:flex;border-top:0.5px solid var(--border);background:var(--bg);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0);}
.nb{flex:1;padding:8px 4px 10px;font-size:10px;color:var(--text2);background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2px solid transparent;-webkit-appearance:none;}
.nb.on{color:var(--purple);border-top-color:var(--purple);}
.nb svg{width:22px;height:22px;fill:currentColor;}

/* Home */
.dh{text-align:center;margin-bottom:20px;padding-top:6px;}
.dh h1{font-size:21px;font-weight:600;color:var(--text);}
.dh p{font-size:13px;color:var(--text2);margin-top:3px;}
.start-btn{width:100%;padding:18px;background:var(--purple);color:#fff;border:none;border-radius:16px;font-size:17px;font-weight:600;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;}
.start-btn:active{opacity:.85;}
.hsec h3{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;}
.hitem{background:var(--bg2);border-radius:12px;padding:13px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.hitem:active{opacity:.75;}
.hdate{font-size:14px;font-weight:600;color:var(--text);}
.hdur{font-size:12px;color:var(--text2);margin-top:2px;}

/* ===== ENTRY SCREEN ===== */
.entry-header{background:var(--purple);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.entry-header h2{font-size:16px;font-weight:600;color:#fff;}
.entry-progress{font-size:13px;color:rgba(255,255,255,.75);}
.progress-track{height:3px;background:rgba(255,255,255,.25);flex-shrink:0;}
.progress-bar{height:100%;background:#fff;transition:width .35s ease;}

/* 上部：質問エリア（スクロール可能） */
.q-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 12px;}
.q-label{font-size:11px;color:var(--purple);font-weight:600;margin-bottom:8px;letter-spacing:.3px;}
.q-text{font-size:20px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:14px;}
.q-image-wrap{margin-bottom:16px;border-radius:14px;overflow:hidden;background:var(--bg2);}
.q-image-wrap img{width:100%;display:block;max-height:200px;object-fit:cover;}

/* 下部：入力エリア（固定） */
.entry-bottom{flex-shrink:0;background:var(--bg);border-top:0.5px solid var(--border);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px));}
.q-hint{font-size:12px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.q-hint svg{width:13px;height:13px;fill:var(--text3);flex-shrink:0;}
.answer-area{
  width:100%;
  min-height:90px;
  max-height:180px;
  padding:13px 14px;
  border:1.5px solid var(--border2);
  border-radius:14px;
  font-size:16px;
  color:var(--text);
  background:var(--bg2);
  resize:none;
  -webkit-appearance:none;
  outline:none;
  font-family:inherit;
  line-height:1.6;
  display:block;
}
.answer-area:focus{border-color:var(--purple);}
.entry-actions{display:flex;gap:10px;margin-top:10px;}
.btn-prev{padding:13px 18px;background:none;border:0.5px solid var(--border2);border-radius:12px;font-size:14px;color:var(--text2);cursor:pointer;-webkit-appearance:none;white-space:nowrap;}
.btn-next-q{flex:1;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;-webkit-appearance:none;}
.btn-next-q:active{opacity:.85;}
.btn-next-q.save{background:var(--green-dark);}

/* Done */
.done-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.done-ico{width:72px;height:72px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.done-ico svg{width:36px;height:36px;fill:var(--green-dark);}
.done h2{font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px;}
.done p{font-size:14px;color:var(--text2);line-height:1.7;}
.done-btn{margin-top:28px;padding:14px 36px;background:var(--purple);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;-webkit-appearance:none;}
.done-btn:active{opacity:.85;}

/* Log */
.log-entry{background:var(--bg);border:0.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;}
.log-date{font-size:12px;color:var(--text2);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.log-del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;-webkit-appearance:none;}
.log-qa{margin-bottom:10px;}
.log-q{font-size:11px;color:var(--purple);font-weight:600;margin-bottom:4px;}
.log-a{font-size:14px;color:var(--text);line-height:1.65;}
.empty{text-align:center;padding:64px 24px;color:var(--text3);font-size:14px;line-height:1.8;}

/* Settings */
.ssec{margin-bottom:22px;}
.shead{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;letter-spacing:.4px;text-transform:uppercase;}
.scard{background:var(--bg);border:0.5px solid var(--border);border-radius:16px;overflow:hidden;}
.srow{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);}
.srow:last-child{border-bottom:none;}
.slab{font-size:15px;color:var(--text);}
.sval{font-size:14px;color:var(--text2);}
.tog{width:44px;height:26px;border-radius:13px;background:var(--purple);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.tog::after{content:'';width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;right:3px;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.tog.off{background:var(--bg3);}
.tog.off::after{right:auto;left:3px;}
input[type=time]{border:none;font-size:14px;color:var(--text);background:transparent;cursor:pointer;outline:none;}
.qi{padding:12px 16px;border-bottom:0.5px solid var(--border);}
.qi:last-child{border-bottom:none;}
.qi-top{display:flex;align-items:flex-start;gap:10px;}
.qi-img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;border:0.5px solid var(--border);cursor:pointer;}
.qi-img-placeholder{width:48px;height:48px;border-radius:8px;background:var(--bg2);border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
.qi-img-placeholder svg{width:20px;height:20px;fill:var(--text3);}
.qi-body{flex:1;min-width:0;}
.qitxt{font-size:14px;color:var(--text);margin-bottom:6px;line-height:1.4;}
.qiact{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border2);color:var(--text2);cursor:pointer;background:none;-webkit-appearance:none;}
.chip.del{color:var(--red-dark);border-color:#F09595;}
.chip.img{color:var(--purple);border-color:var(--purple);}
.chip.img-del{color:var(--text3);}
.addq{padding:12px 16px;border-top:0.5px solid var(--border);}
.addq input{width:100%;padding:10px 12px;border:0.5px solid var(--border2);border-radius:10px;font-size:14px;color:var(--text);background:var(--bg2);-webkit-appearance:none;outline:none;}
.addq button{width:100%;margin-top:8px;padding:10px;background:none;border:0.5px solid var(--purple);border-radius:10px;color:var(--purple);font-size:14px;cursor:pointer;font-weight:600;-webkit-appearance:none;}
.delbtn{width:100%;margin-top:10px;padding:13px;background:none;border:0.5px solid var(--red);border-radius:14px;font-size:14px;color:var(--red);cursor:pointer;font-weight:600;-webkit-appearance:none;}
.note{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:10px;padding:10px 14px;margin-top:8px;line-height:1.6;}
input[type=file]{display:none;}
</style>
</head>
<body>
<div class="app">
  <div class="sbar">
    <span id="sbar-time">--:--</span>
    <span style="font-weight:600;">音声日記</span>
    <span style="font-size:10px;">●●●</span>
  </div>

  <!-- HOME -->
  <div class="screen on" id="sc-home">
    <div class="scroll">
      <div class="dh">
        <h1 id="today-label"></h1>
        <p id="today-sub">今日の日記をつけよう</p>
      </div>
      <button class="start-btn" onclick="startEntry()">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:#fff;"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 3.27-3.32 5.8-6.91 5.8s-6.42-2.53-6.91-5.8H2.09C2.6 15.34 6.02 18.35 10 18.91V22h4v-3.09c3.98-.56 7.4-3.57 7.91-7.91h-2z"/></svg>
        今日の日記をはじめる
      </button>
      <div class="hsec">
        <h3>最近の記録</h3>
        <div id="hlist"></div>
        <div id="hempty" style="display:none;font-size:13px;color:var(--text3);text-align:center;padding:20px 0;">まだ記録がありません</div>
      </div>
    </div>
  </div>

  <!-- ENTRY -->
  <div class="screen" id="sc-entry">
    <div class="entry-header">
      <h2 id="entry-date"></h2>
      <span class="entry-progress" id="entry-prog">1 / 4</span>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="prog-bar" style="width:25%;"></div>
    </div>

    <!-- 上部：質問・画像（スクロール可能） -->
    <div class="q-scroll" id="q-scroll">
      <div class="q-label" id="q-label">質問 1</div>
      <div class="q-text" id="q-text"></div>
      <div class="q-image-wrap" id="q-image-wrap" style="display:none;">
        <img id="q-image" src="" alt="">
      </div>
    </div>

    <!-- 下部：テキストエリア＋ボタン（画面下固定） -->
    <div class="entry-bottom">
      <div class="q-hint">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 3.27-3.32 5.8-6.91 5.8s-6.42-2.53-6.91-5.8H2.09C2.6 15.34 6.02 18.35 10 18.91V22h4v-3.09c3.98-.56 7.4-3.57 7.91-7.91h-2z"/></svg>
        キーボードの🎤で音声入力できます
      </div>
      <textarea class="answer-area" id="answer-area" placeholder="ここに答えを入力..."></textarea>
      <div class="entry-actions">
        <button class="btn-prev" id="btn-prev" onclick="prevQ()">‹ 戻る</button>
        <button class="btn-next-q" id="btn-next-q" onclick="nextQ()">次の質問へ ›</button>
      </div>
    </div>
  </div>

  <!-- DONE -->
  <div class="screen" id="sc-done">
    <div class="done-wrap done">
      <div class="done-ico"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
      <h2>保存しました！</h2>
      <p>今日の日記を記録しました。<br>お疲れさまでした。</p>
      <button class="done-btn" onclick="tab('home')">ホームへ戻る</button>
    </div>
  </div>

  <!-- LOG -->
  <div class="screen" id="sc-log">
    <div class="scroll">
      <div style="margin-bottom:16px;padding-top:4px;display:flex;justify-content:space-between;align-items:center;">
        <h2 style="font-size:20px;font-weight:700;color:var(--text);">履歴</h2>
        <span id="log-count" style="font-size:13px;color:var(--text2);"></span>
      </div>
      <div id="loglist"></div>
      <div class="empty" id="log-empty" style="display:none;">日記をつけるとここに<br>内容が表示されます</div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="screen" id="sc-settings">
    <div class="scroll">
      <div style="margin-bottom:16px;padding-top:4px;"><h2 style="font-size:20px;font-weight:700;color:var(--text);">設定</h2></div>
      <div class="ssec">
        <div class="shead">通知</div>
        <div class="scard">
          <div class="srow"><span class="slab">毎日通知</span><div class="tog off" id="notif-tog" onclick="toggleNotif()"></div></div>
          <div class="srow"><span class="slab">通知時刻</span><input type="time" id="notif-time" value="22:00" onchange="S.notifTime=this.value;save();"></div>
        </div>
        <div class="note">iPhoneの「ショートカット」アプリ → オートメーション → 時刻 → 「URLを開く」でこのアプリのURLを設定してください。</div>
      </div>
      <div class="ssec">
        <div class="shead">質問リスト</div>
        <div class="scard">
          <div id="qlist-s"></div>
          <div class="addq">
            <input id="newq" placeholder="新しい質問を入力..." onkeydown="if(event.key==='Enter')addQ();">
            <button onclick="addQ()">＋ 質問を追加</button>
          </div>
        </div>
        <div class="note">各質問に画像を設定できます。日記入力中に画像が上部に表示されます。</div>
      </div>
      <div class="ssec">
        <div class="shead">データ</div>
        <div class="scard">
          <div class="srow"><span class="slab">保存件数</span><span class="sval" id="data-count">0件</span></div>
          <div class="srow"><span class="slab">保存場所</span><span class="sval">この端末のみ</span></div>
        </div>
        <button class="delbtn" onclick="clearData()">すべての記録を削除</button>
      </div>
    </div>
  </div>

  <input type="file" id="img-input" accept="image/*">

  <div class="nav" id="main-nav">
    <button class="nb on" id="nb-home" onclick="tab('home')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      ホーム
    </button>
    <button class="nb" id="nb-log" onclick="tab('log')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
      履歴
    </button>
    <button class="nb" id="nb-settings" onclick="tab('settings')">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      設定
    </button>
  </div>
</div>

<script>
const SK='vdiary_v6';
const DAYS=['日','月','火','水','木','金','土'];
let S={
  questions:[
    {text:'今日、一番よかったことは何ですか？',img:''},
    {text:'今日、難しかったことや改善したいことは？',img:''},
    {text:'今日の感情・気分を一言で表すと？',img:''},
    {text:'明日の自分へ一言。',img:''}
  ],
  logs:[],notifOn:false,notifTime:'22:00'
};
function load(){
  try{
    const s=localStorage.getItem(SK);
    if(s){
      const p=JSON.parse(s);
      if(p.questions&&typeof p.questions[0]==='string') p.questions=p.questions.map(t=>({text:t,img:''}));
      S={...S,...p};
    }
  }catch(e){}
}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

let curQ=0,sessionAnswers=[],entryStart=null,imgUploadTarget=-1;

function tab(n){
  ['home','log','settings','entry','done'].forEach(x=>{
    document.getElementById('sc-'+x).classList.remove('on');
    const nb=document.getElementById('nb-'+x);if(nb)nb.classList.remove('on');
  });
  document.getElementById('sc-'+n).classList.add('on');
  const nb=document.getElementById('nb-'+n);if(nb)nb.classList.add('on');
  document.getElementById('main-nav').style.display=(n==='entry'||n==='done')?'none':'flex';
  if(n==='log')renderLog();
  if(n==='settings')renderSettings();
  if(n==='home')renderHomeList();
}

function initUI(){
  const d=new Date();
  document.getElementById('today-label').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日（'+DAYS[d.getDay()]+'）';
  function tick(){const n=new Date();document.getElementById('sbar-time').textContent=pad(n.getHours())+':'+pad(n.getMinutes());}
  tick();setInterval(tick,15000);
}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function pad(n){return String(n).padStart(2,'0');}

function startEntry(){
  curQ=0;
  sessionAnswers=S.questions.map(()=>'');
  entryStart=new Date();
  const d=entryStart;
  document.getElementById('entry-date').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日（'+DAYS[d.getDay()]+'）';
  tab('entry');
  showQ();
}

function showQ(){
  const total=S.questions.length;
  const q=S.questions[curQ];
  document.getElementById('q-label').textContent='質問 '+(curQ+1)+' / '+total;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('entry-prog').textContent=(curQ+1)+' / '+total;
  document.getElementById('prog-bar').style.width=(((curQ+1)/total)*100)+'%';
  document.getElementById('answer-area').value=sessionAnswers[curQ];

  const wrap=document.getElementById('q-image-wrap');
  const img=document.getElementById('q-image');
  if(q.img){img.src=q.img;wrap.style.display='block';}
  else{wrap.style.display='none';img.src='';}

  const nextBtn=document.getElementById('btn-next-q');
  if(curQ>=total-1){nextBtn.textContent='保存する ✓';nextBtn.className='btn-next-q save';}
  else{nextBtn.textContent='次の質問へ ›';nextBtn.className='btn-next-q';}
  document.getElementById('btn-prev').style.visibility=curQ===0?'hidden':'visible';

  // 質問エリアを先頭にスクロール
  document.getElementById('q-scroll').scrollTop=0;

  // テキストエリアにフォーカス
  setTimeout(()=>document.getElementById('answer-area').focus(),300);
}

function nextQ(){
  sessionAnswers[curQ]=document.getElementById('answer-area').value.trim();
  if(curQ>=S.questions.length-1){saveEntry();}
  else{curQ++;showQ();}
}
function prevQ(){
  sessionAnswers[curQ]=document.getElementById('answer-area').value.trim();
  if(curQ>0){curQ--;showQ();}
}
function saveEntry(){
  const now=new Date();
  const secs=Math.round((now-entryStart)/1000);
  const entry={id:Date.now(),date:now.toISOString(),duration:secs,qas:S.questions.map((q,i)=>({q:q.text,a:sessionAnswers[i]||''}))};
  S.logs.unshift(entry);
  if(S.logs.length>30)S.logs=S.logs.slice(0,30);
  save();tab('done');
}

/* Image upload */
function triggerImgUpload(idx){
  imgUploadTarget=idx;
  document.getElementById('img-input').value='';
  document.getElementById('img-input').click();
}
document.getElementById('img-input').addEventListener('change',function(e){
  const file=e.target.files[0];
  if(!file||imgUploadTarget<0)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const MAX=800;
      let w=img.width,h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      S.questions[imgUploadTarget].img=canvas.toDataURL('image/jpeg',0.75);
      save();renderSettings();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});
function removeImg(idx){S.questions[idx].img='';save();renderSettings();}

/* Render */
function renderHomeList(){
  const list=document.getElementById('hlist'),empty=document.getElementById('hempty');
  const d=new Date();
  const done=S.logs.length>0&&isSameDay(new Date(S.logs[0].date),d);
  document.getElementById('today-sub').textContent=done?'今日はもう記録済みです ✓':'今日の日記をつけよう';
  list.innerHTML='';
  if(!S.logs.length){empty.style.display='block';return;}
  empty.style.display='none';
  S.logs.slice(0,5).forEach(log=>{
    const ld=new Date(log.date);
    const div=document.createElement('div');div.className='hitem';
    div.innerHTML='<div><div class="hdate">'+(ld.getMonth()+1)+'月'+ld.getDate()+'日（'+DAYS[ld.getDay()]+'）</div><div class="hdur">'+pad(ld.getHours())+':'+pad(ld.getMinutes())+'　'+log.qas.length+'問</div></div><span style="font-size:18px;color:var(--text3);">›</span>';
    div.onclick=()=>tab('log');list.appendChild(div);
  });
}

function renderLog(){
  const list=document.getElementById('loglist'),empty=document.getElementById('log-empty'),count=document.getElementById('log-count');
  list.innerHTML='';
  if(!S.logs.length){empty.style.display='block';count.textContent='';return;}
  empty.style.display='none';count.textContent=S.logs.length+'件';
  S.logs.forEach(log=>{
    const d=new Date(log.date);
    const card=document.createElement('div');card.className='log-entry';
    let h='<div class="log-date"><span>'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+DAYS[d.getDay()]+'）　'+pad(d.getHours())+':'+pad(d.getMinutes())+'</span><button class="log-del" onclick="deleteLog('+log.id+')">削除</button></div>';
    (log.qas||[]).forEach(qa=>{
      if(qa.a)h+='<div class="log-qa"><div class="log-q">'+qa.q+'</div><div class="log-a">'+qa.a+'</div></div>';
    });
    card.innerHTML=h;list.appendChild(card);
  });
}
function deleteLog(id){if(!confirm('この記録を削除しますか？'))return;S.logs=S.logs.filter(l=>l.id!==id);save();renderLog();renderHomeList();}

function renderSettings(){
  const ql=document.getElementById('qlist-s');ql.innerHTML='';
  S.questions.forEach((q,i)=>{
    const div=document.createElement('div');div.className='qi';
    const hasImg=!!q.img;
    const imgHTML=hasImg
      ?'<img class="qi-img" src="'+q.img+'" alt="" onclick="triggerImgUpload('+i+')">'
      :'<div class="qi-img-placeholder" onclick="triggerImgUpload('+i+')"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></div>';
    div.innerHTML=
      '<div class="qi-top">'+imgHTML+
      '<div class="qi-body"><div class="qitxt">'+q.text+'</div><div class="qiact">'+
      '<button class="chip" onclick="mqUp('+i+')">↑</button>'+
      '<button class="chip" onclick="mqDown('+i+')">↓</button>'+
      '<button class="chip img" onclick="triggerImgUpload('+i+')">'+(hasImg?'画像変更':'＋画像')+'</button>'+
      (hasImg?'<button class="chip img-del" onclick="removeImg('+i+')">画像削除</button>':'')+
      '<button class="chip del" onclick="mqDel('+i+')">削除</button>'+
      '</div></div></div>';
    ql.appendChild(div);
  });
  document.getElementById('notif-time').value=S.notifTime||'22:00';
  document.getElementById('notif-tog').className='tog'+(S.notifOn?'':' off');
  document.getElementById('data-count').textContent=S.logs.length+'件';
}

function toggleNotif(){S.notifOn=!S.notifOn;save();renderSettings();}
function addQ(){const inp=document.getElementById('newq'),v=inp.value.trim();if(!v)return;S.questions.push({text:v,img:''});save();inp.value='';renderSettings();}
function mqDel(i){if(S.questions.length<=1)return;S.questions.splice(i,1);save();renderSettings();}
function mqUp(i){if(i===0)return;[S.questions[i-1],S.questions[i]]=[S.questions[i],S.questions[i-1]];save();renderSettings();}
function mqDown(i){if(i>=S.questions.length-1)return;[S.questions[i],S.questions[i+1]]=[S.questions[i+1],S.questions[i]];save();renderSettings();}
function clearData(){if(!confirm('すべての記録を削除しますか？この操作は取り消せません。'))return;S.logs=[];save();renderLog();renderHomeList();renderSettings();}

load();initUI();renderHomeList();
</script>
